apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app-v2

spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-app
      version: v2
  template:
    metadata:
      labels:
        app: devops-app
        version: v2
        color: green
    spec:
      containers:
        - name: devops-app
          image: devops-app:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: APP_VERSION
              value: "v2"