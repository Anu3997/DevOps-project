apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app-v1

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devops-app
      version: v1

  template:
    metadata:
      labels:
        app: devops-app
        version: v1
        color: blue

    spec:
      containers:
        - name: devops-app
          image: devops-app:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 3000

          env:
            - name: APP_VERSION
              value: "v1"